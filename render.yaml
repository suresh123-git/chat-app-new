services:
  - type: web
    name: chat-app-backend
    env: node
    buildCommand: cd backend && npm install && npm run build
    startCommand: cd backend && npm run start:prod
    plan: starter
    healthCheckPath: /health/ready
    envVars:
      - key: MONGO_URI
      - key: JWT_SECRET
      - key: REDIS_URL
      - key: ALLOWED_ORIGINS
      - key: NODE_ENV
        value: production

staticSites:
  - name: chat-app-frontend
    repo: .
    branch: main
    buildCommand: npm install && npm run build
    publishPath: dist/frontend
    envVars:
      - key: NODE_ENV
        value: production
