services:
  - type: web
    name: chat-app-backend
    runtime: node
    rootDir: backend
    plan: free

    buildCommand: npm install && npm run build
    startCommand: npm run start:prod

    envVars:
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: NODE_ENV
        value: production